{% extends 'layouts/layout.html' %}

{% block body %}

<div class="container d-flex justify-content-center align-items-center vh-100">
     <form class="p-5 bg-dark custom-form" method = "POST", action = "{% url 'user_signup' %}">
       {% csrf_token %}
        <h3 class="mb-4">signup form</h3>
       {% for inp in form %}
        <div class="mb-3">
          {{inp.label_tag}}
          {{inp}}
        </div>
       {% endfor %}
       <button type="submit" class="btn btn-primary w-100">Signup</button>
       <div class = "mt-3"> Already have an account? <a href="{% url 'login_user' %}" class="link-danger"> Login </a> </div>
     
      </form>
   </div>     
     



{% endblock %}
